name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build step is omitted until the src→dist migration is complete.
      # When module.json is updated to load dist/pf2e-gm-toolkit.bundle.js,
      # re-add: setup-node, npm ci, npm run build — and switch the ZIP to dist/.

      - name: Create release ZIP
        run: |
          cd foundry-module/pf2e-gm-toolkit
          mkdir -p release-staging
          # scripts/ is included because module.json currently loads from scripts/.
          # When the src→dist migration lands, remove scripts/ and module.json
          # will be updated to load dist/pf2e-gm-toolkit.bundle.js instead.
          cp -r scripts templates styles data module.json release-staging/
          cd release-staging
          zip -r ../../../pf2e-gm-toolkit.zip .
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: pf2e-gm-toolkit.zip
          generate_release_notes: true
          name: "pf2e-gm-toolkit ${{ github.ref_name }}"
