name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: foundry-module/pf2e-gm-toolkit/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: foundry-module/pf2e-gm-toolkit

      - name: Build module
        run: npm run build
        working-directory: foundry-module/pf2e-gm-toolkit

      - name: Create release ZIP
        run: |
          cd foundry-module/pf2e-gm-toolkit
          mkdir -p release-staging
          cp -r dist templates styles data module.json release-staging/
          cd release-staging
          zip -r ../../../pf2e-gm-toolkit.zip .
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: pf2e-gm-toolkit.zip
          generate_release_notes: true
          name: "pf2e-gm-toolkit ${{ github.ref_name }}"
