name: CI

on:
  pull_request:
    branches:
      - foundry-module
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: foundry-module/pf2e-gm-toolkit

      - name: Validate build configuration
        run: npm run build:validate
        working-directory: foundry-module/pf2e-gm-toolkit
